name: Release VyCode Binaries

on:
  push:
    tags:
      - 'v*' # Memicu workflow ketika Anda membuat tag versi seperti v1.0.0

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build for ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            suffix: .exe
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            suffix: ""
          - os: macos-latest
            target: x86_64-apple-darwin
            suffix: ""
          - os: macos-latest
            target: aarch64-apple-darwin
            suffix: ""

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Build Optimized Binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package Binary (Windows)
        if: runner.os == 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          compress-archive -Path vycode.exe -DestinationPath ../../../vycode-${{ matrix.target }}.zip

      - name: Package Binary (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar -czvf ../../../vycode-${{ matrix.target }}.tar.gz vycode

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: |
            vycode-*.zip
            vycode-*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
